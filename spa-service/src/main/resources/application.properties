spring.application.name=spa-service
server.address=0.0.0.0
server.port=${PORT:8082}

spring.datasource.url=jdbc:mysql://${SPA_DB_HOST:localhost}:${SPA_DB_PORT:3306}/${SPA_DB_NAME:spa_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${SPA_DB_USER:spa_user}
spring.datasource.password=${SPA_DB_PASSWORD:spa_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:serenity-spa-super-secret-key-change-me-2026}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://*.vercel.app,https://*.netlify.app,https://*.devtunnels.ms}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
