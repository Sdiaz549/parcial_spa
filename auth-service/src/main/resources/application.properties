spring.application.name=auth-service
server.address=0.0.0.0
server.port=${PORT:8081}

spring.datasource.url=jdbc:postgresql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:5432}/${AUTH_DB_NAME:auth_db}
spring.datasource.username=${AUTH_DB_USER:auth_user}
spring.datasource.password=${AUTH_DB_PASSWORD:auth_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:serenity-spa-super-secret-key-change-me-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://*.vercel.app,https://*.netlify.app,https://*.devtunnels.ms}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
