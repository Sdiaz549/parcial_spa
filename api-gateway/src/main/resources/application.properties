spring.application.name=api-gateway
server.address=0.0.0.0
server.port=${PORT:8080}

services.auth.url=${AUTH_SERVICE_URL:http://auth-service:8081}
services.spa.url=${SPA_SERVICE_URL:http://spa-service:8082}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://*.vercel.app,https://*.netlify.app,https://*.devtunnels.ms}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${services.auth.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=spa-service-services
spring.cloud.gateway.routes[1].uri=${services.spa.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/services/**

spring.cloud.gateway.routes[2].id=spa-service-appointments
spring.cloud.gateway.routes[2].uri=${services.spa.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/appointments/**

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=${cors.allowed-origins}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
