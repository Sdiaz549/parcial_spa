<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin Servicios</title><link rel="stylesheet" th:href="@{/styles.css}"></head>
<body>
<nav><a href="/">Inicio</a><a href="/admin/appointments">Admin Reservas</a><a href="/logout">Salir</a></nav>
<main>
    <h1>Gestion de servicios</h1>
    <form method="post" action="/admin/services" class="grid-form">
        <input name="name" placeholder="Nombre" required>
        <input name="description" placeholder="Descripcion" required>
        <input name="price" type="number" step="0.01" placeholder="Precio" required>
        <input name="durationMinutes" type="number" placeholder="Duracion" required>
        <input name="imageUrl" placeholder="URL imagen">
        <label><input type="checkbox" name="active" checked> Activo</label>
        <button type="submit">Crear servicio</button>
    </form>
    <table>
        <thead><tr><th>Nombre</th><th>Precio</th><th>Duracion</th><th>Activo</th><th></th></tr></thead>
        <tbody>
        <tr th:each="s : ${services}">
            <td th:text="${s.name}"></td>
            <td th:text="${s.price}"></td>
            <td th:text="${s.durationMinutes}"></td>
            <td th:text="${s.active}"></td>
            <td>
                <form th:action="@{'/admin/services/delete/' + ${s.id}}" method="post">
                    <button type="submit">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
