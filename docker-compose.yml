services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: serenity-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - serenity-network

  mysql-spa:
    image: mysql:8.0
    container_name: serenity-mysql-spa
    environment:
      MYSQL_DATABASE: spa_db
      MYSQL_USER: spa_user
      MYSQL_PASSWORD: spa_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_spa_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - serenity-network

  auth-service:
    build:
      context: ./auth-service
    container_name: serenity-auth-service
    environment:
      PORT: 8081
      AUTH_DB_HOST: postgres-auth
      AUTH_DB_PORT: 5432
      AUTH_DB_NAME: auth_db
      AUTH_DB_USER: auth_user
      AUTH_DB_PASSWORD: auth_password
      JWT_SECRET: serenity-spa-super-secret-key-change-me-2026
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,https://*.vercel.app,https://*.netlify.app,https://*.devtunnels.ms
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - serenity-network

  spa-service:
    build:
      context: ./spa-service
    container_name: serenity-spa-service
    environment:
      PORT: 8082
      SPA_DB_HOST: mysql-spa
      SPA_DB_PORT: 3306
      SPA_DB_NAME: spa_db
      SPA_DB_USER: spa_user
      SPA_DB_PASSWORD: spa_password
      JWT_SECRET: serenity-spa-super-secret-key-change-me-2026
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,https://*.vercel.app,https://*.netlify.app,https://*.devtunnels.ms
    ports:
      - "8082:8082"
    depends_on:
      mysql-spa:
        condition: service_healthy
    networks:
      - serenity-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: serenity-api-gateway
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      SPA_SERVICE_URL: http://spa-service:8082
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,https://*.vercel.app,https://*.netlify.app,https://*.devtunnels.ms
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - spa-service
    networks:
      - serenity-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_API_URL: http://localhost:8080
        VITE_SPA_API_URL: http://localhost:8080
    container_name: serenity-frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - spa-service
    networks:
      - serenity-network

volumes:
  postgres_auth_data:
  mysql_spa_data:

networks:
  serenity-network:
    driver: bridge
